<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweet 19 Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #3a0ca3);
      color: #fff;
      overflow-x: hidden;
    }

    header {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('feto.jpg') center/cover no-repeat;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .hero {
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      letter-spacing: 2px;
    }

    .hero h2 {
      margin-top: 10px;
      font-weight: 300;
      font-size: 1.2rem;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 30px;
      background: linear-gradient(45deg, #ff006e, #8338ec);
      color: #fff;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    section {
      padding: 80px 20px;
      text-align: center;
    }

    .details {
      background: #111;
    }

    .details h2 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      margin: 10px auto;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }

    footer {
      text-align: center;
      padding: 30px;
      background: #000;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <div class="hero">
    <h1>Sweet 19</h1>
    <h2>You are invited to celebrate a special night</h2>
    <a href="#details" class="btn">View Invitation</a>
  </div>
</header>

<section id="details" class="details">
  <h2>Event Details</h2>
  <div class="card">
    <p><strong>Name:</strong> Fetoacia</p>
    <p><strong>Date:</strong> Saturday, January 23rd, 2027</p>
    <p><strong>Time:</strong> 7 PM</p>
    <p><strong>Venue:</strong> Spaces</p>
  </div>
</section>

<section>
  <h2>Dress Code</h2>
  <p>Glamorous & Elegant ✨</p>
</section>

<section>
  <h2>RSVP</h2>
  <p>Please confirm your attendance</p>
  <a href="#" class="btn">RSVP Now</a>
</section>

<footer>
  <p>Made with love for my Sweet 19 💖</p>
</footer>

</body>
</html>
